mode: shadow_maker

exchange:
  platform: polymarket
  clob_url: https://clob.polymarket.com
  gamma_url: https://gamma-api.polymarket.com
  ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  chain_id: 137

strategy:
  edge_threshold: 0.02
  kelly_fraction: 0.25
  stake_min: 5.0
  stake_max: 10.0
  fee_rate: 0.02
  max_spread: 0.15
  hypotheses: [H7]
  crypto15m_model:
    enabled: true
    artifact_path: research/artifacts/crypto15m_btc190/latest_manifest.json
    require_accepted_artifact: true
    min_confidence: 0.75
    min_net_ev: 0.02
    reload_interval_sec: 300

lab:
  enabled: true
  mode: shadow_maker
  universe:
    max_markets: 1
    max_horizon_days: 30
  scheduler:
    market_refresh_sec: 30
    signal_eval_sec: 1
    equity_sample_sec: 5
  ab_testing:
    enabled: false
    control_suffix: control
    learned_suffix: learned
  execution:
    ttl_sec: 30
    reprice_sec: 5
    max_reprices: 3
    force_exit_after_failed_reprices: 3
    latency_penalty_bps: 2.0
    max_event_age_ms: 2500
  market_quality:
    enabled: true
    min_score_default: 55
    require_end_date: true
    require_yes_no_pair: true
  crypto15m:
    enabled: true
    trade_assets: [BTC]
    max_horizon_hours: 2
    max_open_positions: 1
    entry_cooldown_sec: 780
    stop_min_hold_sec: 90
    candidate_window_minutes: 14
    candidate_min_time_to_resolution_sec: 180
    candidate_target_time_to_resolution_sec: 420
    candidate_target_tolerance_sec: 0
    min_entry_price: 0.30
    max_entry_price: 0.82
    min_abs_return_zscore_15m: 0.50
    min_trend_consistency_15m: 0.35
    signal_eval_sec: 1
    min_depth_usd: 35
    max_spread: 0.04
    min_net_ev: 0.02
    max_poly_return_abs: 1.0
    maker_wait_sec: 8
    allow_taker_entry: true
    taker_entry_minutes: 20
    min_confidence: 0.75
    momentum_threshold: 0.0004
    allow_no_trade_fallback: true
    no_trade_fallback_max_probability: 0.82
    ab_thresholds: [0.65, 0.75]
    control_min_confidence: 0.45
    live_ohlcv_enabled: true
    live_ohlcv_poll_sec: 10
    live_ohlcv_lookback_minutes: 120
    live_ohlcv_stale_sec: 180
    shadow_stake_max: 10.0
    post_ab_shadow_stake_max: 10.0
    slug_discovery_enabled: true
    slug_discovery_behind_intervals: 0
    slug_discovery_ahead_intervals: 1
    slug_discovery_concurrency: 8
    reward_guard_enabled: true
    reward_min_score: 0.0
    reward_size_penalty: 0.001
    reward_fill_penalty: 0.004
    reward_drawdown_penalty: 0.25
    reward_stop_streak_penalty: 0.006
    reward_market_exit_penalty: 0.004
    reward_min_fill_rate: 0.15
    reward_stop_streak_limit: 2
    reward_lookback_trades: 12
    reward_lookback_orders: 30
    reward_lookback_hours: 24
    reward_strong_signal_min_score: 0.25
    reward_strong_signal_min_edge: 0.30
    side_regime_guard_enabled: true
    side_regime_min_trades: 2
    side_regime_min_avg_pnl: 0.0
    ai_analyst:
      enabled: false
      shadow_only: true
      provider: qwen
      model: qwen-turbo
      endpoint: https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions
      timeout_sec: 8.0
      temperature: 0.1
      top_p: 0.8
      max_tokens: 120
      market_cooldown_sec: 180
      cache_ttl_sec: 180
      max_calls_per_hour: 24
      min_signal_confidence: 0.70
      min_signal_edge: 0.02
      min_time_to_resolution_sec: 180
      max_time_to_resolution_sec: 1200
      analyst_only_below_confidence: 0.75
  portfolios:
    - key: Crypto15m_t75_live
      hypotheses: [H7]
      pack: crypto15m
      track: crypto15m
      max_horizon_days: 1
      min_daily_volume: 5
      min_depth_usd: 35
      max_spread: 0.04
      min_quality_score: 55
      time_to_resolution_max_hours: 2
      stop_loss_pct: 0.12
      take_profit_pct: 0.08
      max_hold_hours: 0.25
      allow_taker_entry_minutes: 20
      stake_max_override: 10.0
  exit_time_hours: 72

risk:
  max_positions: 30
  max_concentration: 0.10
  daily_loss_limit: 0.05
  weekly_loss_limit: 0.10
  total_drawdown_stop: 0.20
  max_correlated_exposure: 0.15

liquidity:
  min_daily_volume: 5
  min_depth_usd: 35
  max_price_impact: 0.005
  min_spread: 0.001

bankroll:
  initial: 1500
  currency: USDC

database:
  url: "sqlite:///prediction_trader.db"

logging:
  level: INFO
  file: logs/trader.log
  rotation: "10 MB"
  retention: "30 days"

crypto_data:
  enabled: true
  exchange_primary: binance
  exchange_fallbacks: [okx, bybit]
  symbols: [BTC/USDT]
  timeframes: [1m, 5m, 15m]
  history_days: 90
  out_dir: data/crypto_ohlcv
