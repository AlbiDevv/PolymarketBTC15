database:
  url: "sqlite:///prediction_trader_smoke.db"

strategy:
  learned_model:
    artifact_path: research/artifacts/learned_model_smoke/latest_manifest.json
    min_candidate_net_ev: 0.001
    max_candidate_entry_price: 0.995
    candidate_stride_sec: 300

historical:
  sync:
    out_dir: data/polymarket_historical_smoke
    page_limit: 2
    batch_size: 50
    date_backfill_days: 30
    date_backfill_stride_days: 10
    date_backfill_page_limit: 1
  price_window:
    out_dir: data/polymarket_historical_smoke
    pre_event_minutes: 60
    post_event_minutes: 30
    fidelity_sec: 300
    concurrency: 6
    max_markets_per_settlement_day: 3
    max_markets_per_run: 24
    min_markets_required: 8
    min_coverage_days: 7
    fail_on_insufficient_history: false

research:
  holdouts:
    window_days: 7
    windows_count: 1
    min_high_conf_accuracy: 0.50
    max_calibration_error: 0.50
    min_rows_per_holdout: 4
    min_high_conf_count_per_holdout: 1
