mode: dry_run  # dry_run | paper | live | shadow_maker

exchange:
  platform: polymarket
  clob_url: https://clob.polymarket.com
  gamma_url: https://gamma-api.polymarket.com
  ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  chain_id: 137

strategy:
  edge_threshold: 0.02
  kelly_fraction: 0.25
  stake_min: 1.0
  stake_max: 2.0
  cycle_interval_sec: 60
  market_refresh_sec: 60
  live_decision_interval_sec: 5
  max_markets_per_cycle: 150
  fee_rate: 0.02
  max_spread: 0.15
  exit:
    stop_loss_pct: 0.15
    take_profit_pct: 0.25
    time_exit_hours: 0
    enabled: true
  hypotheses:
    - H2
    - H4
  learned_model:
    enabled: true
    artifact_path: research/artifacts/learned_model/latest_manifest.json
    require_accepted_artifact: true
    veto_margin: 0.005
    min_candidate_confidence: 0.65
    min_candidate_net_ev: 0.001
    max_candidate_entry_price: 0.995
    estimated_slippage: 0.0
    candidate_stride_sec: 300
    reload_interval_sec: 300
  crypto15m_model:
    enabled: true
    artifact_path: research/artifacts/crypto15m/latest_manifest.json
    require_accepted_artifact: false
    min_confidence: 0.90
    min_net_ev: 0.003
    reload_interval_sec: 300

lab:
  enabled: true
  mode: shadow_maker
  universe:
    max_markets: 150
    max_horizon_days: 30
  scheduler:
    market_refresh_sec: 30
    signal_eval_sec: 1
    equity_sample_sec: 5
  ab_testing:
    enabled: true
    control_suffix: control
    learned_suffix: learned
  ws_quality:
    enabled: true
    freeze_on_stale: true
    freeze_below_health_score: 0.45
    gap_burst_threshold: 3
    persist_interval_sec: 15
    alert_disconnect: true
    alert_stale: true
    alert_gap_burst: true
  execution:
    ttl_sec: 30
    reprice_sec: 5
    max_reprices: 3
    force_exit_after_failed_reprices: 3
  market_quality:
    enabled: true
    min_score_default: 60
    require_end_date: true
    require_yes_no_pair: true
    hard_block_keywords_social:
      - tweet
      - tweets
      - post
      - posts
      - followers
      - likes
      - mentions
      - retweets
      - views
      - subscribers
    hard_block_keywords_dispute:
      - control
      - ceasefire
      - withdraw
      - under control
      - sovereignty
      - occupation
  late_stage:
    enabled: true
    portfolios: [Late_balanced, Late_aggressive]
    persistence_sec: 120
    imbalance_ratio_min: 2.5
    extreme_yes_min: 0.92
    extreme_yes_max: 0.08
    taker_entry_minutes: 15
    take_profit_pct: 0.015
    stop_loss_pct: 0.01
    max_hold_minutes: 30
  crypto15m:
    enabled: true
    max_horizon_hours: 2
    candidate_window_minutes: 15
    signal_eval_sec: 1
    min_depth_usd: 100
    max_spread: 0.04
    min_net_ev: 0.003
    max_poly_return_abs: 1.0
    maker_wait_sec: 8
    allow_taker_entry: true
    taker_entry_minutes: 20
    min_confidence: 0.90
    momentum_threshold: 0.003
    ab_thresholds: [0.70, 0.80, 0.90, 0.95]
    control_min_confidence: 0.55
    live_ohlcv_enabled: true
    live_ohlcv_poll_sec: 10
    live_ohlcv_lookback_minutes: 120
    live_ohlcv_stale_sec: 90
    shadow_stake_max: 2.0
    post_ab_shadow_stake_max: 5.0
    slug_discovery_enabled: true
    slug_discovery_behind_intervals: 1
    slug_discovery_ahead_intervals: 4
    slug_discovery_concurrency: 8
  exit_time_hours: 72
  portfolios:
    - key: H2_base
      hypotheses: [H2]
      pack: base
      track: control
      max_horizon_days: 30
      min_daily_volume: 500
      min_depth_usd: 50
      max_spread: 0.15
      min_quality_score: 60
    - key: H4_base
      hypotheses: [H4]
      pack: base
      track: control
      max_horizon_days: 30
      min_daily_volume: 500
      min_depth_usd: 50
      max_spread: 0.15
      min_quality_score: 60
    - key: Combo_base
      hypotheses: [H2, H4]
      combo_mode: true
      pack: base
      track: control
      max_horizon_days: 30
      min_daily_volume: 500
      min_depth_usd: 50
      max_spread: 0.15
      min_quality_score: 60
    - key: H2_strict
      hypotheses: [H2]
      pack: strict
      track: control
      max_horizon_days: 7
      min_daily_volume: 2000
      min_depth_usd: 200
      max_spread: 0.05
      min_quality_score: 70
    - key: H4_strict
      hypotheses: [H4]
      pack: strict
      track: control
      max_horizon_days: 7
      min_daily_volume: 2000
      min_depth_usd: 200
      max_spread: 0.05
      min_quality_score: 70
    - key: Combo_strict
      hypotheses: [H2, H4]
      combo_mode: true
      pack: strict
      track: control
      max_horizon_days: 7
      min_daily_volume: 2000
      min_depth_usd: 200
      max_spread: 0.05
      min_quality_score: 70
    - key: Late_balanced
      hypotheses: [H6]
      pack: late_balanced
      track: late_stage
      max_horizon_days: 1
      min_daily_volume: 5000
      min_depth_usd: 500
      max_spread: 0.03
      min_quality_score: 70
      time_to_resolution_max_hours: 6
      stop_loss_pct: 0.01
      take_profit_pct: 0.015
      max_hold_hours: 0.5
      allow_taker_entry_minutes: 15
    - key: Late_aggressive
      hypotheses: [H6]
      pack: late_aggressive
      track: late_stage
      max_horizon_days: 1
      min_daily_volume: 2000
      min_depth_usd: 200
      max_spread: 0.05
      min_quality_score: 55
      time_to_resolution_max_hours: 12
      stop_loss_pct: 0.01
      take_profit_pct: 0.02
      max_hold_hours: 0.5
      allow_taker_entry_minutes: 15
    - key: Crypto15m
      hypotheses: [H7]
      pack: crypto15m
      track: crypto15m
      max_horizon_days: 1
      min_daily_volume: 100
      min_depth_usd: 100
      max_spread: 0.04
      min_quality_score: 55
      time_to_resolution_max_hours: 2
      stop_loss_pct: 0.01
      take_profit_pct: 0.02
      max_hold_hours: 0.25
      allow_taker_entry_minutes: 20
      stake_max_override: 2.0

risk:
  max_positions: 30
  max_concentration: 0.10
  daily_loss_limit: 0.05
  weekly_loss_limit: 0.10
  total_drawdown_stop: 0.20
  max_correlated_exposure: 0.15

liquidity:
  min_daily_volume: 500
  min_depth_usd: 50
  max_price_impact: 0.005
  min_spread: 0.001

bankroll:
  initial: 500
  currency: USDC

database:
  url: "sqlite:///prediction_trader.db"

logging:
  level: INFO
  file: logs/trader.log
  rotation: "10 MB"
  retention: "30 days"

alerts:
  telegram_enabled: false
  telegram_bot_token: ""
  telegram_chat_id: ""
  telegram_admin_chat_id: ""
  telegram_admin_chat_ids: []

telegram:
  webapp_url: ""
  dev_initdata_bypass: true
  dashboard_mode: ssh_hint

dashboard:
  base_url: http://127.0.0.1:8090
  host: 127.0.0.1
  port: 8090
  locale: ru
  auto_refresh_sec: 5
  ssh_tunnel_hint: ssh -L 8090:127.0.0.1:8090 root@SERVER_IP
  local_url_hint: http://127.0.0.1:8090/dashboard

collector:
  interval_sec: 300
  settlement_check_sec: 900

historical:
  bootstrap:
    source_paths: []
    out_dir: data/polymarket_historical
  sync:
    out_dir: data/polymarket_historical
    page_limit: 20
    batch_size: 100
    date_backfill_days: 0
    date_backfill_stride_days: 30
    date_backfill_page_limit: 3
  price_window:
    out_dir: data/polymarket_historical
    pre_event_minutes: 60
    post_event_minutes: 30
    fidelity_sec: 60
    concurrency: 8
    max_markets_per_settlement_day: 12
    max_markets_per_run: 250
    min_markets_required: 100
    min_coverage_days: 30
    fail_on_insufficient_history: true

crypto_data:
  enabled: true
  exchange_primary: binance
  exchange_fallbacks: [okx, bybit]
  symbols: [BTC/USDT, ETH/USDT]
  timeframes: [1m, 5m, 15m]
  history_days: 90
  out_dir: data/crypto_ohlcv

research:
  holdouts:
    window_days: 90
    windows_count: 3
    min_high_conf_accuracy: 0.95
    max_calibration_error: 0.08
    min_rows_per_holdout: 100
    min_high_conf_count_per_holdout: 25
    monitoring_export_dir: research/artifacts/monitoring
    grafana_dir: research/artifacts/grafana
